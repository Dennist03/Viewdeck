services:
  weather:
    image: nginx:alpine
    container_name: weather-dash
    restart: unless-stopped
    ports:
      - "5002:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./config.js:/usr/share/nginx/html/config.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro